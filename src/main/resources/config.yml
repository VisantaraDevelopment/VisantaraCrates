# ╔══════════════════════════════════════════════════════════════════════════╗
# ║   VisantaraCrates — config.yml                                          ║
# ║   Custom Crate Plugin  |  Paper 1.21+  |  Java 21                      ║
# ║                                                                          ║
# ║   QUICK START                                                            ║
# ║     1. Set web.secret-token to a long, random string.                   ║
# ║     2. Set web.hostname to your Server IP (Use 'ping' to verify).       ║
# ║     3. Restart the server, then run /vc web in-game.                    ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────────────────────────────────
# DATABASE
# Supported types: sqlite (zero setup) | mysql (recommended for large servers)
# ─────────────────────────────────────────────────────────────────────────────
database:
  # "sqlite" stores data in a single file inside the plugin folder.
  # "mysql" requires a running MySQL 8+ / MariaDB server.
  type: sqlite

  sqlite:
    # File path relative to /plugins/VisantaraCrates/
    file: visantaracrates.db

  mysql:
    host: localhost
    port: 3306
    database: visantaracrates
    username: root
    password: changeme
    # HikariCP connection pool size — 10 is sufficient for most servers.
    pool-size: 10
    # Timeouts in milliseconds (adjust only if you experience drops).
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

# ─────────────────────────────────────────────────────────────────────────────
# CONFIG VERSIONING — do NOT modify this manually
# ─────────────────────────────────────────────────────────────────────────────
config-version: 4

# ─────────────────────────────────────────────────────────────────────────────
# GENERAL SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
settings:
  # Enables verbose console output for debugging crate events and DB queries.
  debug: false

  # Whether to record every crate opening in the database (analytics).
  log-openings: true

  # Maximum number of simultaneous crate animations across all players.
  # Increase this on high-population servers (costs RAM per session).
  max-concurrent-openings: 50

  # Whether to check for plugin updates on startup (async, no lag).
  check-updates: true

  # Notify operators on join if an update is available.
  notify-ops-on-join: true

  # ── Pity System Master Toggle ──────────────────────────────────────────
  # Set to false to GLOBALLY disable the pity system across ALL crates.
  # When disabled: no pity tracking, no soft/hard pity rolls, no pity
  # display in GUI, no pity placeholders. Per-crate pity configs are ignored.
  enable-pity: false

# ─────────────────────────────────────────────────────────────────────────────
# VAULT ECONOMY INTEGRATION
# Requires Vault + an economy plugin (e.g., EssentialsX, CMI).
# All Vault features degrade gracefully if Vault is absent.
# ─────────────────────────────────────────────────────────────────────────────
vault:
  # Master toggle for Vault integration. Set to false to fully disable.
  enabled: true

  # Format string for economy amounts in messages. {amount} = numeric value.
  currency-format: "${amount}"

# ─────────────────────────────────────────────────────────────────────────────
# KEY SYSTEM
# Two modes:
#   virtual  — Keys are stored as a database balance. Secure and recommended.
#   physical — Keys are physical items with a PDC tag. Tradeable between players.
#
# Key definitions are stored in keys.yml.
# ─────────────────────────────────────────────────────────────────────────────
keys:
  mode: virtual

  physical:
    # Bukkit Material used for the physical key item.
    material: TRIPWIRE_HOOK

    # Custom Model Data for resource-pack support. Set to -1 to disable.
    custom-model-data: -1

    # Display name of the physical key item. Supports & color codes.
    # Placeholder: {key} → the key ID.
    display-name: "&bCrate Key &8[&7{key}&8]"

    # First lore line showing the key ID (used for item identification).
    id-lore: "&7Key ID: &e{key}"

    # Additional lore lines appended below the ID line.
    extra-lore:
      - ""
      - "&8▸ &7Right-click a crate to use."

crates:
  physical:
    # Bukkit Material used for the physical crate item.
    material: CHEST

    # Custom Model Data for resource-pack support. Set to -1 to disable.
    custom-model-data: -1

    # Display name of the physical crate item. Supports & color codes.
    # Placeholders: {crate} -> crate display name, {type} -> FREE/PREMIUM.
    display-name: "&6{crate} Crate &8(&7{type}&8)"

    # Lore line showing the crate ID.
    id-lore: "&7Crate ID: &e{crate}"

    # Lore line showing the crate type.
    type-lore: "&7Type: &b{type}"

    # Additional lore lines appended below.
    extra-lore:
      - ""
      - "&8▸ &7Right-click anywhere to open!"

