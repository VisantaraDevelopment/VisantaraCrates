# ─────────────────────────────────────────────────────────────────────────────
# ANIMATION CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────
animations:
  choice:
    # Title of the CHOICE animation menu. Placeholder: {crate} -> crate name
    title: "&0&lChoose Reward: {crate}"
    filler:
      # Material for background/filler slots in Choice GUI.
      material: "GRAY_STAINED_GLASS_PANE"
      # Custom Model Data for filler item. Set to -1 to disable.
      custom-model-data: -1
      # Nexo item ID to override background filler. Set to "" to disable.
      nexo-item: ""